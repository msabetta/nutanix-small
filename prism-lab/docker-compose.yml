services:
  backend:
    build: ./backend
    container_name: prism-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: prism-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend